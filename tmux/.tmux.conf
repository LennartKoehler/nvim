set -g default-terminal "tmux-256color"

set -g mode-keys vi
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
bind-key -T copy-mode-vi v send-keys -X begin-selection
set -g base-index 1
unbind C-b
set -g prefix M-j
bind -n M-j send-prefix

set -s escape-time 0
set -g repeat-time 0

# ── Per-session styling ──────────────────────────────────────────────
# Uses #{?condition,true,false} conditional formats.
# Change "agent" below to match your agent session name.

# Status bar background/foreground: dark red tint for agent, black for personal
set -g status-style '#{?#{m:agent*,#{session_name}},bg=#330000 fg=#ffaaaa,bg=#001133 fg=#ffffff}'

# Left status: prominent session badge so you always know where you are
set -g status-left '#{?#{m:agent*,#{session_name}},#[bg=red fg=white bold]  AGENT  #[default] ,#[bg=blue fg=black bold]  DEV  #[default] }'

set -g status-right ''
#
# # Inactive windows
# set -g window-status-format '#{?#{m:agent*,#{session_name}},#[fg=colour254,bg=colour88],#[fg=colour254,bg=colour235]} #I: #W #[default]'
#
# # Active window
# set -g window-status-current-format '#{?#{m:agent*,#{session_name}},#[fg=white,bg=colour203],#[fg=black,bg=255]} #I: #W #[default]'
#


# Inactive windows (dark gray background, light gray text)
set -g window-status-format "#[fg=colour254,bg=colour235] #I: #W #[default]"

# Active window (blue background, white text, bold)
set -g window-status-current-format "#[fg=black,bg=#ffffff] #I: #W #[bg=#ffffff]"
# Separators between windows
set -g window-status-separator '#[bg=default]  '

