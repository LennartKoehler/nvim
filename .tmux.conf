set -g default-terminal "tmux-256color"

set -g mode-keys vi
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
set -g base-index 1

set -s escape-time 0
set -g repeat-time 0

set -g status-style 'bg=#000000,fg=#ffffff'
set -g window-status-current-style 'bg=#ffffff,fg=#000000'
set -g status-left ''
set -g status-right ''

# Inactive windows (dark gray background, light gray text)
set -g window-status-format "#[fg=colour254,bg=colour235] #I: #W #[default]"

# Active window (blue background, white text, bold)
set -g window-status-current-format "#[fg=black,bg=255] #I: #W #[default]"

# Optional: separators between windows
set -g window-status-separator "  "
